name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single in-flight deploy at a time; cancel earlier in-progress
# pushes since GH Pages overwrites.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Subpath at which GH Pages serves the repo. Override here if the
  # project gets a custom domain (then this should be empty).
  BASE_PATH: /vcfclick-demo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - name: Build
        env:
          BASE_PATH: ${{ env.BASE_PATH }}
        run: bun run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
